name: CI-macOS
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
concurrency:
  # Keep only the newest macOS run per ref so stale queued runs do not pile up.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: Julia 1.10 - macos-13 - x64
    runs-on: macos-13
    timeout-minutes: 60
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: "3.11"
      - name: Install Python deps
        shell: bash
        run: |
          "${{ steps.setup-python.outputs.python-path }}" -m pip install --upgrade pip sympy
          "${{ steps.setup-python.outputs.python-path }}" -c "import sys, sympy; print(sys.executable); print(sympy.__version__)"
      - uses: julia-actions/setup-julia@v3
        with:
          version: "1.10"
          arch: x64
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
        env:
          JULIA_CONDAPKG_BACKEND: Null
          JULIA_PYTHONCALL_EXE: ${{ steps.setup-python.outputs.python-path }}
      - uses: julia-actions/julia-runtest@v1
        env:
          JULIA_CONDAPKG_BACKEND: Null
          JULIA_PYTHONCALL_EXE: ${{ steps.setup-python.outputs.python-path }}
