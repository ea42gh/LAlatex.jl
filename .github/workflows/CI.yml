name: CI
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
concurrency:
  # Keep only the newest run per ref so stale queued runs do not pile up.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: '1.10'
            os: ubuntu-latest
            arch: x64
          - version: '1.12'
            os: ubuntu-latest
            arch: x64
          - version: 'pre'
            os: ubuntu-latest
            arch: x64
          - version: '1.10'
            os: windows-latest
            arch: x64
          - version: '1.10'
            os: macos-13
            arch: x64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: "3.11"
      - name: Install Python deps
        shell: bash
        run: |
          "${{ steps.setup-python.outputs.python-path }}" -m pip install --upgrade pip sympy
          "${{ steps.setup-python.outputs.python-path }}" -c "import sys, sympy; print(sys.executable); print(sympy.__version__)"
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
        env:
          JULIA_CONDAPKG_BACKEND: Null
          JULIA_PYTHONCALL_EXE: ${{ steps.setup-python.outputs.python-path }}
      - uses: julia-actions/julia-runtest@v1
        env:
          JULIA_CONDAPKG_BACKEND: Null
          JULIA_PYTHONCALL_EXE: ${{ steps.setup-python.outputs.python-path }}
