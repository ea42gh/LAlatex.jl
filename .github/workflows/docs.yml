name: Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          "${{ steps.setup-python.outputs.python-path }}" -m pip install --upgrade pip sympy
          "${{ steps.setup-python.outputs.python-path }}" -c "import sys, sympy; print(sys.executable); print(sympy.__version__)"

      - name: Smoke-check notebooks
        run: |
          "${{ steps.setup-python.outputs.python-path }}" docs/smoke_notebooks.py

      - name: Set up Julia
        uses: julia-actions/setup-julia@v3
        with:
          version: "1.10"

      - name: Execute representative notebook smoke test
        env:
          JULIA_CONDAPKG_BACKEND: Null
          JULIA_PYTHONCALL_EXE: ${{ steps.setup-python.outputs.python-path }}
        run: |
          "${{ steps.setup-python.outputs.python-path }}" docs/execute_notebook_smoke.py docs/src/notebooks/LAlatex_L_show_Guide.ipynb
          "${{ steps.setup-python.outputs.python-path }}" docs/execute_notebook_smoke.py docs/src/notebooks/LAlatex_cases_Guide.ipynb

      - name: Cache Julia artifacts
        uses: julia-actions/cache@v3

      - name: Build and deploy docs
        env:
          JULIA_CONDAPKG_BACKEND: Null
          JULIA_PYTHONCALL_EXE: ${{ steps.setup-python.outputs.python-path }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # docs/make.jl refreshes the dev path, resolves, instantiates, runs doctests,
        # and then calls deploydocs.
        run: julia --project=docs docs/make.jl
