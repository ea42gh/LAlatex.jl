name: Register Package
on:
  workflow_dispatch:
      inputs:
            version:
                description: 'Version to register'
                required: true
                type: string
jobs:
  register:
      runs-on: ubuntu-latest
      steps:
          - uses: actions/checkout@v4
          - uses: julia-actions/RegisterAction@latest
            with:
                token: ${{ secrets.GITHUB_TOKEN }}
