name: Register Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to register
        required: true
        default: "1.0.0"
        type: string
      subdir:
        description: Package subdirectory, leave empty for repo root
        required: false
        default: ""
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/RegisterAction@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          registrator: JuliaRegistrator
